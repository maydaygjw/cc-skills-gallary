<!-- Generic Architecture Visualization Template -->
<!-- This SVG can be customized for various project architectures -->

<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Arial" font-size="20" text-anchor="middle" fill="#1e293b">System Architecture Diagram</text>

  <!-- Client Layer -->
  <rect x="50" y="100" width="150" height="80" rx="10" ry="10" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  <text x="125" y="140" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Clients</text>
  <text x="125" y="160" font-family="Arial" font-size="12" text-anchor="middle" fill="#bfdbfe">Web, Mobile, etc.</text>

  <!-- API Layer -->
  <rect x="325" y="100" width="150" height="80" rx="10" ry="10" fill="#60a5fa" stroke="#1d4ed8" stroke-width="2"/>
  <text x="400" y="140" font-family="Arial" font-size="14" text-anchor="middle" fill="white">API Layer</text>
  <text x="400" y="160" font-family="Arial" font-size="12" text-anchor="middle" fill="#bfdbfe">Gateway, Services</text>

  <!-- Business Logic -->
  <rect x="600" y="100" width="150" height="80" rx="10" ry="10" fill="#93c5fd" stroke="#1d4ed8" stroke-width="2"/>
  <text x="675" y="140" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Business Logic</text>
  <text x="675" y="160" font-family="Arial" font-size="12" text-anchor="middle" fill="#bfdbfe">Processing, Rules</text>

  <!-- Data Layer -->
  <rect x="200" y="250" width="150" height="80" rx="10" ry="10" fill="#c7d2fe" stroke="#6d28d9" stroke-width="2"/>
  <text x="275" y="290" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Data Store</text>
  <text x="275" y="310" font-family="Arial" font-size="12" text-anchor="middle" fill="#ddd6fe">Database, Cache</text>

  <!-- Messaging -->
  <rect x="475" y="250" width="150" height="80" rx="10" ry="10" fill="#ddd6fe" stroke="#6d28d9" stroke-width="2"/>
  <text x="550" y="290" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Messaging</text>
  <text x="550" y="310" font-family="Arial" font-size="12" text-anchor="middle" fill="#c4b5fd">Queue, Events</text>

  <!-- External Services -->
  <rect x="325" y="400" width="150" height="80" rx="10" ry="10" fill="#e0e7ff" stroke="#6d28d9" stroke-width="2"/>
  <text x="400" y="440" font-family="Arial" font-size="14" text-anchor="middle" fill="white">External Services</text>
  <text x="400" y="460" font-family="Arial" font-size="12" text-anchor="middle" fill="#c4b5fd">3rd Party APIs</text>

  <!-- Arrows -->
  <line x1="200" y1="140" x2="325" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="475" y1="140" x2="600" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="180" x2="350" y2="250" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="250" x2="400" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="330" x2="400" y2="400" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="550" y1="330" x2="400" y2="400" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="650" y="450" width="140" height="120" fill="none" stroke="#cbd5e1" stroke-width="1"/>
  <text x="720" y="470" font-family="Arial" font-size="12" text-anchor="middle" fill="#1e293b" font-weight="bold">Legend</text>
  <circle cx="670" cy="490" r="5" fill="#3b82f6"/>
  <text x="680" y="494" font-family="Arial" font-size="10" fill="#1e293b">Clients</text>
  <circle cx="670" cy="510" r="5" fill="#60a5fa"/>
  <text x="680" y="514" font-family="Arial" font-size="10" fill="#1e293b">API Layer</text>
  <circle cx="670" cy="530" r="5" fill="#c7d2fe"/>
  <text x="680" y="534" font-family="Arial" font-size="10" fill="#1e293b">Data</text>
  <circle cx="670" cy="550" r="5" fill="#ddd6fe"/>
  <text x="680" y="554" font-family="Arial" font-size="10" fill="#1e293b">Messaging</text>
</svg>